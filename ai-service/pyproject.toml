[tool.ruff]
# Exclude commonly ignored directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

line-length = 88
indent-width = 4
target-version = "py310"

[tool.ruff.lint]
# Enable standard lint rules
select = ["E", "F", "W", "I"]
ignore = []

# Allow ruff to fix violations automatically
fixable = ["ALL"]
unfixable = []

[tool.pyright]
venvPath = "."
venv = ".venv"

